<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Pixel World Offline-Fixed</title>
    <!-- ВШИТАЯ БИБЛИОТЕКА -->
    <script>
        /* ВСТАВЬ ВЕСЬ ТЕКСТ ИЗ ССЫЛКИ СЮДА */
    </script>

    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: sans-serif; }
        canvas { display: block; }
        #ui { 
            position: absolute; top: 20px; left: 20px; color: #00ff88; 
            background: rgba(0,0,0,0.9); padding: 15px; border-radius: 10px; 
            border: 1px solid #00ff88; pointer-events: none; z-index: 100;
            box-shadow: 0 0 20px rgba(0,255,136,0.3);
        }
        .stats { font-size: 14px; margin-top: 5px; color: #fff; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="my-nick" style="font-weight: bold; font-size: 18px;">Подключение...</div>
        <div class="stats" id="status">Статус: Запуск системы...</div>
        <div class="stats" id="player-count">Игроков: 1</div>
    </div>
    <canvas id="game"></canvas>

<script>
    // ТВОЙ РАБОЧИЙ КЛЮЧ
    const API_KEY = 'Sbw0Fg.34o05Q:z4epDMZAArkhjqou86RiTKr_L7NuWUZ5i8KTBArdXZs';
    
    let ably, channel;
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    const myId = Math.random().toString(36).substring(7);
    const nicks = ["Мега Пиксель", "Кибер Тень", "Альфа Бот", "Скрытный", "Фантом"];
    const myNick = nicks[Math.floor(Math.random() * nicks.length)] + "#" + Math.floor(Math.random()*99);
    
    let me = {
        id: myId, nick: myNick,
        x: Math.random() * 500 + 100, y: Math.random() * 400 + 100,
        color: `hsl(${Math.random() * 360}, 90%, 60%)`, lastSeen: Date.now()
    };

    let players = {};
    players[myId] = me;

    const keys = {};
    window.onkeydown = (e) => keys[e.code] = true;
    window.onkeyup = (e) => keys[e.code] = false;

    function initGame() {
        document.getElementById('status').innerText = "Статус: Подключение к сети...";
        
        try {
            // Используем библиотеку, которая теперь вшита в файл
            ably = new Ably.Realtime({ key: API_KEY });

            ably.connection.on('connected', () => {
                document.getElementById('status').innerText = "Статус: В СЕТИ ✅";
                document.getElementById('my-nick').innerText = "Ты: " + myNick;
                channel = ably.channels.get('global-room');
                
                channel.subscribe('u', (msg) => {
                    if (msg.data.id !== myId) {
                        players[msg.data.id] = msg.data;
                        players[msg.data.id].lastSeen = Date.now();
                    }
                });
                requestAnimationFrame(gameLoop);
            });

            ably.connection.on('failed', (err) => {
                document.getElementById('status').innerText = "Ошибка: Лимит ключа исчерпан";
            });

        } catch (e) {
            document.getElementById('status').innerText = "Ошибка: " + e.message;
        }
    }

    function update() {
        let moved = false;
        const speed = 6;
        if (keys['KeyW'] || keys['ArrowUp']) { me.y -= speed; moved = true; }
        if (keys['KeyS'] || keys['ArrowDown']) { me.y += speed; moved = true; }
        if (keys['KeyA'] || keys['ArrowLeft']) { me.x -= speed; moved = true; }
        if (keys['KeyD'] || keys['ArrowRight']) { me.x += speed; moved = true; }

        if (moved && channel) {
            me.lastSeen = Date.now();
            channel.publish('u', me);
        }

        for (let id in players) {
            if (id !== myId && Date.now() - players[id].lastSeen > 4000) {
                delete players[id];
            }
        }
        document.getElementById('player-count').innerText = "Игроков в сети: " + Object.keys(players).length;
    }

    function gameLoop() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        update();

        Object.values(players).forEach(p => {
            ctx.shadowBlur = 20;
            ctx.shadowColor = p.color;
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, 28, 28);
            ctx.shadowBlur = 0;
            ctx.fillStyle = "white";
            ctx.font = "bold 14px Arial";
            ctx.textAlign = "center";
            ctx.fillText(p.nick, p.x + 14, p.y - 12);
        });
        requestAnimationFrame(gameLoop);
    }

    window.onload = initGame;
</script>
</body>
</html>
