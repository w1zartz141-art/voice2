<!DOCTYPE html>
<html>
<head>
    <title>Pixel Party Online</title>
    <!-- Подключаем Gun.js для синхронизации без паролей -->
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 15px; left: 15px; color: #00ff00; pointer-events: none; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="status">Подключение...</div>
        <div id="my-nick"></div>
    </div>
    <canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    
    // 1. Инициализация Gun (используем публичные серверы для стыковки)
    const gun = Gun(['https://gun-manhattan.herokuapp.com']);
    const room = gun.get('pixel_room_v1');

    // 2. Генерация твоего персонажа
    const adjs = ["Быстрый", "Синий", "Крутой", "Злой", "Милый"];
    const names = ["Пиксель", "Куб", "Друг", "Гость"];
    const myId = Math.random().toString(36).substring(7);
    const myNick = adjs[Math.floor(Math.random()*adjs.length)] + " " + names[Math.floor(Math.random()*names.length)];
    
    let me = {
        id: myId,
        nick: myNick,
        x: Math.random() * (window.innerWidth - 50),
        y: Math.random() * (window.innerHeight - 50),
        color: `hsl(${Math.random() * 360}, 80%, 60%)`,
        lastSeen: Date.now()
    };

    document.getElementById('my-nick').innerText = "Ты: " + myNick;

    // 3. Управление
    const keys = {};
    window.onkeydown = (e) => keys[e.code] = true;
    window.onkeyup = (e) => keys[e.code] = false;

    // 4. Мир игры
    let players = {};

    // Слушаем изменения в комнате
    room.map().on((data, id) => {
        if (!data) return;
        // Удаляем тех, кто не двигался больше 10 секунд (простейший оффлайн)
        if (Date.now() - data.lastSeen < 10000) {
            players[id] = data;
        } else {
            delete players[id];
        }
    });

    function update() {
        let moved = false;
        const speed = 5;
        
        if (keys['KeyW'] || keys['ArrowUp']) { me.y -= speed; moved = true; }
        if (keys['KeyS'] || keys['ArrowDown']) { me.y += speed; moved = true; }
        if (keys['KeyA'] || keys['ArrowLeft']) { me.x -= speed; moved = true; }
        if (keys['KeyD'] || keys['ArrowRight']) { me.x += speed; moved = true; }

        if (moved) {
            me.lastSeen = Date.now();
            room.get(myId).put(me); // Отправляем свои координаты в сеть
        }
        
        // Постоянно подтверждаем, что мы в сети
        if (Date.now() % 1000 < 20) room.get(myId).put({lastSeen: Date.now()});
    }

    function draw() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        update();

        // Рисуем всех игроков
        Object.values(players).forEach(p => {
            // Тело
            ctx.fillStyle = p.color;
            ctx.shadowBlur = 10;
            ctx.shadowColor = p.color;
            ctx.fillRect(p.x, p.y, 25, 25);
            ctx.shadowBlur = 0;

            // Ник
            ctx.fillStyle = "white";
            ctx.font = "bold 14px Arial";
            ctx.textAlign = "center";
            ctx.fillText(p.nick, p.x + 12.5, p.y - 10);
        });

        document.getElementById('status').innerText = "В сети: " + Object.keys(players).length;
        requestAnimationFrame(draw);
    }

    // На старт!
    room.get(myId).put(me);
    draw();
</script>
</body>
</html>
