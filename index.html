<!DOCTYPE html>
<html>
<head>
    <title>2D Random Walk</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">
        <h2 id="nickname">Присваиваем имя...</h2>
        <p>Стрелки или WASD, чтобы ходить</p>
    </div>
    <canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const nickDisplay = document.getElementById('nickname');

    // 1. Генератор рандомных ников
    const adjectives = ["Быстрый", "Грустный", "Эпичный", "Ловкий", "Сонный"];
    const nouns = ["Енот", "Ниндзя", "Кактус", "Пиксель", "Маг"];
    const randomNick = adjectives[Math.floor(Math.random() * adjectives.length)] + 
                     " " + nouns[Math.floor(Math.random() * nouns.length)];
    nickDisplay.innerText = "Ты: " + randomNick;

    // 2. Параметры игрока
    const player = {
        x: window.innerWidth / 2,
        y: window.innerHeight / 2,
        size: 30,
        speed: 5,
        color: `hsl(${Math.random() * 360}, 70%, 60%)`
    };

    const keys = {};
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    function update() {
        if (keys['ArrowUp'] || keys['KeyW']) player.y -= player.speed;
        if (keys['ArrowDown'] || keys['KeyS']) player.y += player.speed;
        if (keys['ArrowLeft'] || keys['KeyA']) player.x -= player.speed;
        if (keys['ArrowRight'] || keys['KeyD']) player.x += player.speed;
    }

    function draw() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Рисуем персонажа
        ctx.fillStyle = player.color;
        ctx.fillRect(player.x, player.y, player.size, player.size);
        
        // Рисуем ник над головой
        ctx.fillStyle = "white";
        ctx.font = "14px Arial";
        ctx.textAlign = "center";
        ctx.fillText(randomNick, player.x + player.size/2, player.y - 10);

        update();
        requestAnimationFrame(draw);
    }

    draw();
</script>
</body>
</html>
