<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Наш Свой Звонок</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #121212; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .video-container { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        video { width: 300px; height: 225px; background: #000; border-radius: 12px; border: 2px solid #333; object-fit: cover; }
        .status { margin-bottom: 20px; color: #aaa; }
        button { padding: 15px 30px; border-radius: 50px; background: #00c853; color: white; border: none; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="status" class="status">Загрузка связи...</div>
    
    <div class="video-container">
        <video id="localVideo" autoplay muted playsinline></video>
        <video id="remoteVideo" autoplay playsinline></video>
    </div>

    <br>
    <button id="callBtn" style="display:none;" onclick="startConnect()">Подключиться к другу</button>

    <script src="https://unpkg.com"></script>
    
    <script>
        const status = document.getElementById('status');
        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const callBtn = document.getElementById('callBtn');

        // ПРИДУМАЙТЕ С ДРУГОМ ОДНО СЛОВО И НАПИШИТЕ ТУТ (например, 'nasha-komnata-2024')
        const ROOM_NAME = 'retret'; 
        
        let myStream;
        // Твой ID будет 'имя_комнаты-user1', у друга 'имя_комнаты-user2'
        // Для простоты: кто первый зашел, тот и ждет.
        const peer = new Peer(); 

        navigator.mediaDevices.getUserMedia({ video: true, audio: true })
            .then(stream => {
                myStream = stream;
                localVideo.srcObject = stream;
                status.innerText = "Камера готова. Нажми кнопку для связи.";
                callBtn.style.display = "block";
            })
            .catch(err => {
                status.innerText = "Ошибка доступа к камере: " + err;
            });

        // Слушаем входящие звонки
        peer.on('call', call => {
            call.answer(myStream);
            call.on('stream', remoteStream => {
                remoteVideo.srcObject = remoteStream;
                status.innerText = "В сети!";
            });
        });

        function startConnect() {
            // Чтобы не мучиться с ID, просто введи ID друга вручную или договоритесь, 
            // что один всегда звонит другому по конкретному имени.
            const friendId = prompt("Введи ID друга (он появится у него на экране после загрузки):");
            if (friendId) {
                const call = peer.call(friendId, myStream);
                call.on('stream', remoteStream => {
                    remoteVideo.srcObject = remoteStream;
                    status.innerText = "Связь установлена!";
                });
            }
        }

        peer.on('open', id => {
            status.innerText = "Твой личный ID: " + id + " (передай его другу)";
        });
    </script>
</body>
</html>
