<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Супер Звонок</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #121212; color: white; }
        #meet { width: 100%; height: 80vh; display: none; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 8px; transition: 0.3s; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

    <div id="setup">
        <h1>Готов к созвону?</h1>
        <button onclick="startCall()">Подключиться к звонку</button>
    </div>

    <!-- Контейнер для видео -->
    <div id="meet"></div>

    <script src="https://meet.jit.si/external_api.js"></script>

<script>
    function startCall() {
        document.getElementById('setup').style.display = 'none';
        document.getElementById('meet').style.display = 'block';

        const domain = 'meet.jit.si'; // Используем основной бесплатный сервер
        const options = {
            roomName: 'MyPersonalSuperRoom_9988', // Сделай очень уникальным!
            width: '100%',
            height: '100%',
            parentNode: document.querySelector('#meet'),
            lang: 'ru',
            interfaceConfigOverwrite: {
                // Это поможет, если кнопки не прогружаются
                SHOW_JITSI_WATERMARK: false 
            },
            configOverwrite: {
                // Принудительно включаем звук и видео при входе
                startWithAudioMuted: false,
                startWithVideoMuted: false
            }
        };
        const api = new JitsiMeetExternalAPI(domain, options);
    }
</script>
</body>
</html>
