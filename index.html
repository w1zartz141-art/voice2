<!DOCTYPE html>
<html>
<head>
    <title>Global Pixel Room</title>
    <script src="https://www.gstatic.com"></script>
    <script src="https://www.gstatic.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: 'Courier New', monospace; }
        canvas { display: block; }
        #info { position: absolute; top: 10px; left: 10px; color: #0f0; pointer-events: none; text-shadow: 1px 1px #000; }
    </style>
</head>
<body>
    <div id="info">Загрузка...</div>
    <canvas id="game"></canvas>

<script>
    // --- КОНФИГУРАЦИЯ FIREBASE (Вставь свои данные сюда) ---
    const firebaseConfig = {
        apiKey: "ТВОЙ_API_KEY",
        databaseURL: "https://ТВОЙ_ПРОЕКТ.firebaseio.com",
        projectId: "ТВОЙ_PROJECT_ID",
    };
    // -------------------------------------------------------

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const playersRef = db.ref("players");

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    // Генерация ника и цвета
    const nicks = ["Аноним", "Пиксель", "Юзер", "Бот", "Кибер"];
    const myId = Math.random().toString(36).substring(7);
    const myData = {
        id: myId,
        nick: nicks[Math.floor(Math.random()*nicks.length)] + "_" + Math.floor(Math.random()*99),
        x: Math.random() * 500 + 50,
        y: Math.random() * 500 + 50,
        color: `hsl(${Math.random() * 360}, 80%, 50%)`
    };

    let allPlayers = {};
    const myPlayerRef = db.ref(`players/${myId}`);

    // Плавное управление
    const keys = { w: false, a: false, s: false, d: false };
    window.onkeydown = (e) => { keys[e.key.toLowerCase()] = true; };
    window.onkeyup = (e) => { keys[e.key.toLowerCase()] = false; };

    // Подключение и удаление при выходе
    myPlayerRef.set(myData);
    myPlayerRef.onDisconnect().remove();

    // Слушаем обновления всех игроков
    playersRef.on("value", (snapshot) => {
        allPlayers = snapshot.val() || {};
        document.getElementById('info').innerText = `В сети: ${Object.keys(allPlayers).length} | Ты: ${myData.nick}`;
    });

    function move() {
        let moved = false;
        const speed = 4;
        if (keys.w || keys.arrowup) { myData.y -= speed; moved = true; }
        if (keys.s || keys.arrowdown) { myData.y += speed; moved = true; }
        if (keys.a || keys.arrowleft) { myData.x -= speed; moved = true; }
        if (keys.d || keys.arrowright) { myData.x += speed; moved = true; }

        if (moved) {
            myPlayerRef.update({ x: myData.x, y: myData.y });
        }
    }

    function draw() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        move();

        Object.values(allPlayers).forEach(p => {
            // Рисуем тело (пиксель)
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, 20, 20);
            
            // Ник
            ctx.fillStyle = "white";
            ctx.font = "12px monospace";
            ctx.textAlign = "center";
            ctx.fillText(p.nick, p.x + 10, p.y - 8);
        });

        requestAnimationFrame(draw);
    }

    draw();
</script>
</body>
</html>
