<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Chat</title>
<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.box{
    text-align:center;
    background:#1c1c1c;
    padding:40px;
    border-radius:20px;
    width:90%;
    max-width:400px;
}
button{
    width:100%;
    padding:15px;
    margin-top:15px;
    font-size:18px;
    border:none;
    border-radius:30px;
    cursor:pointer;
}
.join{background:#4caf50;color:white;}
.mic{background:#2196f3;color:white;display:none;}
.mic.off{background:#e53935;}
.status{margin-top:20px;color:#bbb;}
</style>
</head>
<body>

<div class="box">
<h2>🎙 Голосовая комната</h2>
<button class="join" id="join">Войти</button>
<button class="mic" id="mic">🎤 Микрофон ВКЛ</button>
<div class="status" id="status">Не подключено</div>
</div>

<script>
let localStream;
let micEnabled = true;
let audioContext;
let gainNode;

const joinBtn = document.getElementById("join");
const micBtn = document.getElementById("mic");
const statusText = document.getElementById("status");

joinBtn.onclick = async () => {

if(location.protocol !== "https:"){
    alert("Нужен HTTPS!");
    return;
}

try{
    statusText.innerText = "Запрос микрофона...";
    localStream = await navigator.mediaDevices.getUserMedia({audio:true});
}catch(e){
    statusText.innerText = "Нет доступа к микрофону!";
    return;
}

audioContext = new AudioContext();
const source = audioContext.createMediaStreamSource(localStream);
gainNode = audioContext.createGain();
source.connect(gainNode);
gainNode.connect(audioContext.destination);

joinBtn.style.display="none";
micBtn.style.display="block";
statusText.innerText="Микрофон активен. Говори — ты должен слышать себя.";

};

micBtn.onclick = ()=>{
micEnabled = !micEnabled;
localStream.getAudioTracks()[0].enabled = micEnabled;

if(micEnabled){
    micBtn.innerText="🎤 Микрофон ВКЛ";
    micBtn.classList.remove("off");
}else{
    micBtn.innerText="🔇 Микрофон ВЫКЛ";
    micBtn.classList.add("off");
}
};
</script>

</body>
</html>
