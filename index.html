<!DOCTYPE html>
<html>
<head>
    <title>Моя Связь</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; }
        video { width: 45%; background: #000; border-radius: 10px; margin: 5px; transform: scaleX(-1); }
        .controls { margin-top: 20px; }
        input { padding: 10px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; border-radius: 5px; background: #28a745; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <h2>Твой ID: <span id="my-id">...</span></h2>
    
    <div>
        <video id="localVideo" autoplay muted></video>
        <video id="remoteVideo" autoplay></video>
    </div>

    <div class="controls">
        <input type="text" id="peer-id" placeholder="ID друга">
        <button onclick="makeCall()">Позвонить</button>
    </div>

    <!-- Подключаем библиотеку PeerJS -->
    <script src="https://unpkg.com"></script>
    
    <script>
        const myIdDisplay = document.getElementById('my-id');
        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        
        // Создаем твой уникальный ID
        const peer = new Peer(); 

        let localStream;

        // 1. Получаем доступ к камере
        navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
            localStream = stream;
            localVideo.srcObject = stream;
        });

        // 2. Показываем твой ID, когда он создастся
        peer.on('open', id => {
            myIdDisplay.innerText = id;
        });

        // 3. Отвечаем на звонок
        peer.on('call', call => {
            call.answer(localStream); // Отправляем свой поток
            call.on('stream', userStream => {
                remoteVideo.srcObject = userStream; // Получаем поток друга
            });
        });

        // 4. Функция самого звонка
        function makeCall() {
            const friendId = document.getElementById('peer-id').value;
            const call = peer.call(friendId, localStream);
            call.on('stream', userStream => {
                remoteVideo.srcObject = userStream;
            });
        }
    </script>
</body>
</html>
