<!DOCTYPE html>
<html>
<head>
    <title>Pixel World Online</title>
    <script src="https://cdn.ably.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a0a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; color: #00ff88; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; border: 1px solid #00ff88; pointer-events: none; box-shadow: 0 0 15px rgba(0,255,136,0.2); }
        .stats { font-size: 14px; margin-top: 5px; color: #fff; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="my-nick" style="font-weight: bold; font-size: 18px;">Подключение...</div>
        <div class="stats" id="status">Игроков в сети: 1</div>
        <div class="stats" style="opacity: 0.6;">WASD или Стрелки, чтобы ходить</div>
    </div>
    <canvas id="game"></canvas>

<script>
    // Инициализация Ably с твоим ключом
    const API_KEY = 'Sbw0Fg.34o05Q:z4epDMZAArkhjqou86RiTKr_L7NuWUZ5i8KTBArdXZs';
    const ably = new Ably.Realtime(API_KEY);
    const channel = ably.channels.get('global-pixel-room');

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    // Генерация персонажа
    const adjs = ["Быстрый", "Мощный", "Скрытный", "Легендарный", "Яркий"];
    const names = ["Пиксель", "Ниндзя", "Герой", "Странник", "Бот"];
    const myId = Math.random().toString(36).substring(7);
    const myNick = adjs[Math.floor(Math.random()*adjs.length)] + " " + names[Math.floor(Math.random()*names.length)];
    
    let me = {
        id: myId,
        nick: myNick,
        x: Math.random() * (window.innerWidth - 100) + 50,
        y: Math.random() * (window.innerHeight - 100) + 50,
        color: `hsl(${Math.random() * 360}, 80%, 60%)`
    };

    document.getElementById('my-nick').innerText = "Ты: " + myNick;

    let players = {};
    players[myId] = me;

    // Подписка на обновления
    channel.subscribe('u', (msg) => {
        const p = msg.data;
        if (p.id !== myId) {
            players[p.id] = p;
            players[p.id].lastSeen = Date.now();
        }
    });

    // Управление
    const keys = {};
    window.onkeydown = (e) => keys[e.code] = true;
    window.onkeyup = (e) => keys[e.code] = false;

    function update() {
        let moved = false;
        const speed = 6;
        
        if (keys['KeyW'] || keys['ArrowUp']) { me.y -= speed; moved = true; }
        if (keys['KeyS'] || keys['ArrowDown']) { me.y += speed; moved = true; }
        if (keys['KeyA'] || keys['ArrowLeft']) { me.x -= speed; moved = true; }
        if (keys['KeyD'] || keys['ArrowRight']) { me.x += speed; moved = true; }

        if (moved) {
            // Отправляем краткие данные для экономии трафика
            channel.publish('u', me);
        }

        // Удаление неактивных (кто вышел)
        for (let id in players) {
            if (id !== myId && Date.now() - players[id].lastSeen > 3000) {
                delete players[id];
            }
        }
        document.getElementById('status').innerText = "Игроков в сети: " + Object.keys(players).length;
    }

    function draw() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        update();

        Object.values(players).forEach(p => {
            // Свечение персонажа
            ctx.shadowBlur = 15;
            ctx.shadowColor = p.color;
            ctx.fillStyle = p.color;
            
            // Рисуем квадрат
            ctx.fillRect(p.x, p.y, 30, 30);
            ctx.shadowBlur = 0;

            // Никнейм
            ctx.fillStyle = "white";
            ctx.font = "bold 14px Arial";
            ctx.textAlign = "center";
            ctx.fillText(p.nick, p.x + 15, p.y - 12);
        });

        requestAnimationFrame(draw);
    }

    // Сообщаем о входе
    channel.publish('u', me);
    draw();
</script>
</body>
</html>
